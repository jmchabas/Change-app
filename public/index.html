<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeOS</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #1e1e2e;
      --text: #e0e0e0;
      --muted: #6b7280;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --blue: #3b82f6;
      --purple: #a855f7;
      --green-dim: #22c55e22;
      --red-dim: #ef444422;
      --gray-dim: #6b728022;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.25rem;
      max-width: 960px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1rem; font-weight: 700; letter-spacing: 0.12em; color: var(--blue); }
    header .meta { color: var(--muted); font-size: 0.75rem; text-align: right; }
    .section { margin-bottom: 1.25rem; }
    .section-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
    }
    .card.alert { border-color: #ef444466; background: #ef444408; }
    .card.good { border-color: #22c55e44; }

    /* ── Today ── */
    .today-top { display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 0.75rem; }
    .big-num { font-size: 3rem; font-weight: 700; line-height: 1; }
    .big-num .denom { font-size: 1.2rem; color: var(--muted); font-weight: 400; }
    .big-num.green { color: var(--green); }
    .big-num.amber { color: var(--amber); }
    .big-num.red { color: var(--red); }
    .mood-badge {
      font-size: 0.8rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .mood-5, .mood-4 { background: #22c55e22; color: var(--green); }
    .mood-3 { background: #f59e0b22; color: var(--amber); }
    .mood-2, .mood-1 { background: #ef444422; color: var(--red); }

    .targets { margin-top: 0.75rem; font-size: 0.8rem; }
    .targets .t { padding: 0.2rem 0; color: var(--muted); }
    .targets .t span { color: var(--text); }

    /* ── Habit dots ── */
    .habits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.35rem;
      margin-top: 0.5rem;
    }
    .habit-row { display: flex; align-items: center; gap: 0.45rem; font-size: 0.78rem; }
    .hdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .hdot.on { background: var(--green); }
    .hdot.off { background: var(--red); opacity: 0.7; }
    .hdot.unk { background: #374151; }
    .habit-label { color: var(--muted); }
    .habit-label.done { color: var(--text); }

    /* ── Stress cluster ── */
    .cluster-warning {
      font-size: 0.8rem;
      color: var(--red);
      margin-top: 0.75rem;
      padding-top: 0.6rem;
      border-top: 1px solid #ef444433;
    }

    /* ── 7-day habit grid ── */
    .habit-grid-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    .habit-grid-table th {
      color: var(--muted);
      font-weight: 400;
      padding: 0.3rem 0.4rem;
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
    }
    .habit-grid-table th.habit-name { text-align: left; letter-spacing: 0; }
    .habit-grid-table td { padding: 0.25rem 0.4rem; text-align: center; }
    .habit-grid-table td.habit-name { text-align: left; color: var(--muted); padding-left: 0; white-space: nowrap; }
    .cell {
      display: inline-block;
      width: 22px; height: 22px;
      border-radius: 4px;
      line-height: 22px;
      font-size: 0.7rem;
    }
    .cell.on  { background: #22c55e22; color: var(--green); }
    .cell.off { background: #ef444422; color: var(--red); }
    .cell.unk { background: var(--gray-dim); color: #374151; }

    /* ── Trend chart ── */
    .chart-wrap { height: 180px; }
    .chart-wrap canvas { width: 100% !important; }

    /* ── Top misses ── */
    .miss-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; font-size: 0.8rem; }
    .miss-bar-bg { flex: 1; height: 6px; background: #1e1e2e; border-radius: 3px; overflow: hidden; }
    .miss-bar { height: 100%; border-radius: 3px; background: var(--red); }
    .miss-bar.ok { background: var(--green); }
    .miss-label { color: var(--muted); width: 80px; flex-shrink: 0; }
    .miss-count { color: var(--text); width: 28px; text-align: right; flex-shrink: 0; }

    /* ── Coaching ── */
    .coaching-text {
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
    }
    .coaching-meta { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.5rem; }

    /* ── Break log ── */
    .break-item { font-size: 0.78rem; padding: 0.35rem 0; border-bottom: 1px solid var(--border); display: flex; gap: 0.6rem; }
    .break-item:last-child { border-bottom: none; }
    .break-date { color: var(--muted); flex-shrink: 0; width: 44px; }
    .break-habit { color: var(--amber); flex-shrink: 0; width: 80px; }
    .break-reason { color: var(--text); }

    /* ── Misc ── */
    .muted { color: var(--muted); }
    .empty { font-size: 0.8rem; color: var(--muted); padding: 0.5rem 0; }

    @media (max-width: 600px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .big-num { font-size: 2.5rem; }
      .habit-grid-table { font-size: 0.7rem; }
      .cell { width: 18px; height: 18px; line-height: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>LIFEOS</h1>
    <div class="meta">
      <div id="header-date"></div>
      <div id="refresh-hint" style="margin-top:2px"></div>
    </div>
  </header>
  <div id="app"><div class="empty" style="text-align:center;padding:3rem">Loading...</div></div>

  <script>
    const HABITS = [
      { key: 'no_escape_media', label: 'Focus' },
      { key: 'fixed_eating',    label: 'Eating' },
      { key: 'clean_evening',   label: 'Clean Eve' },
      { key: 'work_win',        label: 'Work win' },
      { key: 'personal_win',    label: 'Perso win' },
      { key: 'gym',             label: 'Gym' },
      { key: 'kids_quality',    label: 'Kids' },
      { key: 'bed_on_time',     label: 'Bed 10pm' },
    ];
    const TREND_HABITS = [
      { key: 'work_win', label: 'Work win', type: 'binary' },
      { key: 'personal_win', label: 'Perso win', type: 'binary' },
      { key: 'clean_evening', label: 'Clean Eve', type: 'binary' },
      { key: 'gym', label: 'Gym', type: 'binary' },
      { key: 'kids_quality', label: 'Kids', type: 'binary' },
      { key: 'bed_on_time', label: 'Bed', type: 'detailed' },
      { key: 'no_escape_media', label: 'Focus', type: 'detailed' },
      { key: 'fixed_eating', label: 'Eating', type: 'detailed' },
    ];
    const STACK_ITEMS = [
      { key: 'coffee', label: 'Coffee' },
      { key: 'adhd_meds', label: 'ADHD meds' },
      { key: 'gut_bacteria_mgr', label: 'Gut bacteria mgr' },
      { key: 'gut_mvmt', label: 'Gut mvmt' },
    ];
    const RANGE_OPTIONS = [
      { key: 'week', label: 'Week' },
      { key: 'month', label: 'Month' },
      { key: 'ytd', label: 'YTD' },
      { key: 'year', label: 'Year' },
      { key: 'all', label: 'All' },
    ];

    function esc(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    const scoreColor = s => s >= 80 ? 'green' : s >= 60 ? 'amber' : 'red';
    const moodLabel = m => {
      if (!m) return '—';
      if (m <= 2) return 'Terrible';
      if (m <= 4) return 'Rough';
      if (m <= 6) return 'Okay';
      if (m <= 8) return 'Good';
      return 'Great';
    };
    const yn = v => v === 1 ? '<span style="color:var(--green)">✓</span>'
                  : v === 0 ? '<span style="color:var(--red)">✗</span>'
                  : '<span style="color:#374151">·</span>';

    function toDate(d) {
      return new Date(`${d}T00:00:00Z`);
    }

    function formatAxisDate(dateStr) {
      const d = toDate(dateStr);
      const day = d.toLocaleDateString('en-US', { weekday: 'short', timeZone: 'UTC' });
      const md = d.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', timeZone: 'UTC' });
      return `${day} ${md}`;
    }

    function ordinal(n) {
      const mod10 = n % 10;
      const mod100 = n % 100;
      if (mod10 === 1 && mod100 !== 11) return `${n}st`;
      if (mod10 === 2 && mod100 !== 12) return `${n}nd`;
      if (mod10 === 3 && mod100 !== 13) return `${n}rd`;
      return `${n}th`;
    }

    function formatHeaderDate(dateStr) {
      const d = toDate(dateStr);
      const days = ['Sun', 'Mon', 'Tues', 'Wed', 'Thur', 'Fri', 'Sat'];
      const months = [
        'January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December',
      ];
      return `${days[d.getUTCDay()]} ${months[d.getUTCMonth()]} ${ordinal(d.getUTCDate())} ${d.getUTCFullYear()}`;
    }

    function getFilteredByRange(rows, rangeKey) {
      const sorted = [...(rows || [])].sort((a, b) => a.date.localeCompare(b.date));
      if (rangeKey === 'all') return sorted;
      if (rangeKey === 'week') return sorted.slice(-7);
      if (rangeKey === 'month') return sorted.slice(-30);

      const latestDate = sorted.length ? toDate(sorted[sorted.length - 1].date) : new Date();
      if (rangeKey === 'year') {
        const start = new Date(latestDate);
        start.setUTCDate(start.getUTCDate() - 364);
        return sorted.filter((r) => toDate(r.date) >= start);
      }
      if (rangeKey === 'ytd') {
        const start = new Date(Date.UTC(latestDate.getUTCFullYear(), 0, 1));
        return sorted.filter((r) => toDate(r.date) >= start);
      }
      return sorted.slice(-7);
    }

    function formatHoursHm(hours) {
      const v = Number(hours);
      if (!Number.isFinite(v)) return '—';
      const totalMinutes = Math.max(0, Math.round(v * 60));
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      return `${h}h${String(m).padStart(2, '0')}`;
    }

    function cellHtml(val) {
      if (val === 1) return `<span class="cell on">✓</span>`;
      if (val === 0) return `<span class="cell off">✗</span>`;
      return `<span class="cell unk">·</span>`;
    }

    function todayCard(log, targets, date) {
      const score = log ? (log.daily_score ?? log.total_score ?? 0) : null;
      const mood = log ? (log.mood_1_10 ?? log.mood ?? null) : null;
      const isAlert = log && ['no_escape_media','fixed_eating','clean_evening'].filter(h => log[h] === 0).length >= 2;
      const yn = v => v === 1 ? '<span style="color:var(--green)">✓</span>'
        : v === 0 ? '<span style="color:var(--red)">✗</span>'
        : '<span style="color:#374151">·</span>';

      const targetsHtml = targets
        ? `<div class="targets">
            <div class="t">→ Work: <span>${esc(targets.work_target) || '—'}</span></div>
            <div class="t">→ Personal: <span>${esc(targets.personal_target) || '—'}</span></div>
           </div>`
        : `<div class="targets"><div class="t muted">No targets set — use /targets</div></div>`;

      const clusterHtml = isAlert
        ? `<div class="cluster-warning">⚠ Stress cluster — 2+ escapes today</div>` : '';

      return `<div class="card ${isAlert ? 'alert' : score >= 6 ? 'good' : ''}">
        <div class="section-title">Today (${formatAxisDate(date || new Date().toISOString().slice(0, 10))})</div>
        <div class="today-top">
          ${score !== null
            ? `<div class="big-num ${scoreColor(score)}">${score}<span class="denom">/100</span></div>`
            : `<div class="big-num" style="color:var(--muted)">—<span class="denom">/100</span></div>`}
          ${mood ? `<div><div class="mood-badge mood-${Math.min(5, Math.ceil(mood / 2))}">Mood ${mood}/10 · ${moodLabel(mood)}</div></div>` : ''}
        </div>
        ${targetsHtml}
        ${clusterHtml}
        ${log && log.stress_note ? `<div style="margin-top:.6rem;font-size:.75rem;color:var(--muted)">Note: ${esc(log.stress_note)}</div>` : ''}
      </div>`;
    }

    function wearablesCard(wearable, wearablesWeek) {
      const recent = (wearablesWeek || []).slice().sort((a, b) => b.date.localeCompare(a.date)).slice(0, 7);
      const avgSleep = recent.length
        ? (recent.reduce((s, r) => s + (r.sleep_hours || 0), 0) / recent.length).toFixed(1)
        : null;
      const avgSleepScore = recent.filter(r => r.sleep_score != null).length
        ? Math.round(recent.reduce((s, r) => s + (r.sleep_score || 0), 0) / recent.filter(r => r.sleep_score != null).length)
        : null;

      return `<div class="card">
        <div class="section-title">Sleep</div>
        <div class="grid-2">
          <div class="card" style="padding:.8rem; border-color:#1f2937;">
            <div class="muted" style="font-size:.68rem; margin-bottom:.35rem;">Sleep</div>
            <div class="big-num ${wearable?.sleep_hours >= 7 ? 'green' : wearable?.sleep_hours >= 6 ? 'amber' : 'red'}" style="font-size:2rem;">
              ${formatHoursHm(wearable?.sleep_hours)}
            </div>
          </div>
          <div class="card" style="padding:.8rem; border-color:#1f2937;">
            <div class="muted" style="font-size:.68rem; margin-bottom:.35rem;">Sleep score</div>
            <div class="big-num ${wearable?.sleep_score >= 80 ? 'green' : wearable?.sleep_score >= 65 ? 'amber' : 'red'}" style="font-size:2rem;">
              ${wearable?.sleep_score ?? '—'}<span class="denom">/100</span>
            </div>
            <div class="small" style="margin-top:.25rem;">
              ${wearable?.sleep_score != null ? 'Official Fitbit sleep score' : 'Waiting for Fitbit score'}
            </div>
          </div>
        </div>
        <div class="targets" style="margin-top:.8rem;">
          <div class="t">→ 7-day avg sleep: <span>${avgSleep != null ? formatHoursHm(avgSleep) : '—'}</span></div>
          <div class="t">→ 7-day avg score: <span>${avgSleepScore ?? '—'}</span></div>
        </div>
        <div style="margin-top:.75rem;display:flex;align-items:center;gap:.45rem;">
          <button id="fitbit-sync-sleep-now" style="width:auto;padding:.28rem .52rem;background:#1f2937;color:#cbd5e1;border:1px solid #334155;border-radius:6px;font-size:.7rem;cursor:pointer;">
            Refresh Fitbit
          </button>
          <span id="fitbit-sync-sleep-status" class="muted" style="font-size:.72rem;"></span>
        </div>
      </div>`;
    }

    function integrationCard(fitbit) {
      const ok = fitbit?.connected;
      const configured = fitbit?.configured;
      let cta = '';
      if (configured && !ok) {
        cta = `<a href="/auth/fitbit/start" style="color:var(--blue);text-decoration:none">Connect Fitbit</a>`;
      } else if (!configured) {
        cta = `<span class="muted">Set FITBIT_CLIENT_ID / FITBIT_CLIENT_SECRET first</span>`;
      }

      return `<div class="card ${ok ? 'good' : ''}">
        <div class="section-title">Integrations</div>
        <div class="habit-row">
          <div class="hdot ${ok ? 'on' : 'off'}"></div>
          <span class="habit-label ${ok ? 'done' : ''}">Fitbit ${ok ? 'connected' : 'not connected'}</span>
        </div>
        <div class="targets">
          <div class="t">→ Last sync: <span>${fitbit?.lastSyncAt ? new Date(fitbit.lastSyncAt).toLocaleString() : 'never'}</span></div>
          ${fitbit?.lastSyncSummary ? `<div class="t">→ Last result: <span>${esc(fitbit.lastSyncSummary)}</span></div>` : ''}
          ${fitbit?.lastSyncError ? `<div class="t" style="color:var(--red)">→ Last error: <span>${esc(fitbit.lastSyncError)}</span></div>` : ''}
        </div>
        <div style="margin-top:.7rem;font-size:.8rem">${cta}</div>
        <div style="margin-top:.7rem">
          <button id="fitbit-sync-now" style="width:auto;padding:.45rem .7rem;background:#1d4ed8;color:white;border:none;border-radius:6px;font-size:.75rem;cursor:pointer;">
            Sync Fitbit now
          </button>
          <span id="fitbit-sync-status" class="muted" style="font-size:.72rem;margin-left:.5rem;"></span>
        </div>
      </div>`;
    }

    function habitGridCard(logs) {
      // Render oldest -> newest left to right for easier reading.
      const days = [...logs].reverse();
      const headers = days.map(l => `<th>${l.date.slice(5)}</th>`).join('');

      const rows = HABITS.map(h => {
        const cells = days.map(l => `<td>${cellHtml(l[h.key])}</td>`).join('');
        return `<tr><td class="habit-name">${h.label}</td>${cells}</tr>`;
      }).join('');

      return `<div class="card">
        <div class="section-title">7-Day Habit Grid</div>
        <div style="overflow-x:auto">
          <table class="habit-grid-table">
            <tr><th class="habit-name"></th>${headers}</tr>
            ${rows}
          </table>
        </div>
      </div>`;
    }

    function missesCard(logs) {
      const counts = HABITS.map(h => {
        const logged = logs.filter(l => l[h.key] !== null);
        const done = logs.filter(l => l[h.key] === 1).length;
        const total = logged.length;
        return { label: h.label, done, total, missed: total - done };
      }).sort((a, b) => b.missed - a.missed);

      const rows = counts.map(c => {
        const pct = c.total > 0 ? (c.done / c.total * 100) : 0;
        const cls = c.missed === 0 ? 'ok' : '';
        return `<div class="miss-row">
          <span class="miss-label">${c.label}</span>
          <div class="miss-bar-bg"><div class="miss-bar ${cls}" style="width:${pct}%"></div></div>
          <span class="miss-count" style="color:${c.missed === 0 ? 'var(--green)' : c.missed >= 3 ? 'var(--red)' : 'var(--amber)'}">
            ${c.done}/${c.total}
          </span>
        </div>`;
      }).join('');

      return `<div class="card">
        <div class="section-title">Habit Success — Last 7 Days</div>
        ${counts[0].total === 0 ? '<p class="empty">No data yet.</p>' : rows}
      </div>`;
    }

    function coachingCard(reviews) {
      if (!reviews.length) return `<div class="card">
        <div class="section-title">Latest Coaching</div>
        <p class="empty">First Sunday review coming up.</p>
      </div>`;
      const r = reviews[0];
      return `<div class="card">
        <div class="section-title">Latest Coaching</div>
        <div class="coaching-meta">Week of ${r.week_start} · Avg ${r.avg_score}/100${r.avg_mood ? ` · Mood ${r.avg_mood}/10` : ''}</div>
        <div class="coaching-text">${esc(r.coaching_text) || '—'}</div>
      </div>`;
    }

    function breakLogCard(breaks) {
      if (!breaks.length) return `<div class="card">
        <div class="section-title">Stress Log</div>
        <p class="empty">No breaks logged yet.</p>
      </div>`;
      const items = breaks.slice(0, 12).map(b => `
        <div class="break-item">
          <span class="break-date">${esc(b.date?.slice(5))}</span>
          <span class="break-habit">${esc(b.habit?.replace('_', ' '))}</span>
          <span class="break-reason">${esc(b.reason)}</span>
        </div>`).join('');
      return `<div class="card">
        <div class="section-title">Stress Log</div>
        ${items}
      </div>`;
    }

    function latestCheckinLinkCard(payload) {
      if (!payload || !payload.available) {
        return `<div class="card">
          <div class="section-title">Latest Check-in Link</div>
          <p class="empty">${esc(payload?.reason) || 'Link unavailable.'}</p>
        </div>`;
      }

      return `<div class="card">
        <div class="section-title">Latest Check-in Link</div>
        <p style="font-size:.82rem; color:var(--muted); margin-bottom:.5rem;">
          Date: ${payload.date} (valid for 24h)
        </p>
        <a id="latest-checkin-link" href="${payload.link}" target="_blank" rel="noopener noreferrer" style="color:var(--blue); word-break:break-all; font-size:.82rem;">
          ${payload.link}
        </a>
        <div style="margin-top:.6rem;">
          <button id="copy-checkin-link" style="width:auto;padding:.4rem .65rem;background:#374151;color:white;border:none;border-radius:6px;font-size:.75rem;cursor:pointer;">
            Copy link
          </button>
          <span id="copy-checkin-status" class="muted" style="font-size:.72rem;margin-left:.5rem;"></span>
        </div>
      </div>`;
    }

    function scoringGuideCard() {
      return `<div class="card">
        <div class="section-title">Scoring Guide</div>
        <p style="font-size:.82rem; color:var(--muted); margin-bottom:.5rem;">
          See exactly how weekdays and weekends are scored.
        </p>
        <a href="/scoring.html" target="_blank" rel="noopener noreferrer" style="color:var(--blue); font-size:.82rem;">
          Open scoring guide
        </a>
      </div>`;
    }

    function habitToPercent(v) {
      if (v === 1) return 100;
      if (v === 0) return 0;
      return null;
    }

    function detailedPointsToPercent(points) {
      if (points == null) return null;
      return Math.max(0, Math.min(100, points * 10));
    }

    function focusDetailedPercent(log) {
      const m = Number(log.escape_media_minutes);
      if (!Number.isFinite(m) || m < 0) return null;
      if (m === 0) return detailedPointsToPercent(10);
      if (m <= 15) return detailedPointsToPercent(8);
      if (m <= 30) return detailedPointsToPercent(6);
      if (m <= 60) return detailedPointsToPercent(3);
      return detailedPointsToPercent(0);
    }

    function eatingDetailedPercent(log) {
      const c = Number(log.outside_window_meals);
      if (!Number.isFinite(c) || c < 0) return null;
      if (c <= 0) return detailedPointsToPercent(10);
      if (c === 1) return detailedPointsToPercent(6);
      if (c === 2) return detailedPointsToPercent(3);
      return detailedPointsToPercent(0);
    }

    function bedDetailedPercent(log) {
      const bedMin = Number(log.bed_time_minutes);
      if (!Number.isFinite(bedMin)) return null;
      const target = 21 * 60 + 30;
      const delta = bedMin - target;
      if (delta <= 0) return detailedPointsToPercent(10);
      if (delta <= 30) return detailedPointsToPercent(8);
      if (delta <= 60) return detailedPointsToPercent(5);
      if (delta <= 90) return detailedPointsToPercent(2);
      return detailedPointsToPercent(0);
    }

    function trendValueForHabit(log, habit) {
      if (habit.type !== 'detailed') return habitToPercent(log[habit.key]);
      if (habit.key === 'no_escape_media') return focusDetailedPercent(log);
      if (habit.key === 'fixed_eating') return eatingDetailedPercent(log);
      if (habit.key === 'bed_on_time') return bedDetailedPercent(log);
      return habitToPercent(log[habit.key]);
    }

    function renderSleepChart(wearables) {
      const ctx = document.getElementById('sleep-chart');
      if (!ctx || !wearables || wearables.length === 0) return;
      const days = [...wearables];

      const sleepHours = days.map((w) => {
        const v = Number(w.sleep_hours);
        if (!Number.isFinite(v)) return null;
        // Some Fitbit days come back as 0h when no sleep payload exists.
        // Treat as missing so the trend bridges surrounding known points.
        if (v === 0 && (w.sleep_score == null)) return null;
        return v;
      });
      const sleepScores = days.map((w) => {
        const v = Number(w.sleep_score);
        if (!Number.isFinite(v)) return null;
        // Treat empty/invalid score days as missing to avoid false dips.
        if (v <= 0) return null;
        return v;
      });

      if (sleepChart) sleepChart.destroy();
      sleepChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Sleep time (h)',
              data: sleepHours,
              borderColor: '#3b82f6',
              backgroundColor: '#3b82f615',
              fill: false,
              tension: 0.35,
              pointRadius: 3,

    function trendRangeControls(selected) {
      return `<div class="card" style="padding:.7rem 1rem;">
        <div class="section-title" style="margin-bottom:.45rem;">Trend Range</div>
        <div class="inline">
          <label class="muted" for="trend-range-select" style="font-size:.8rem;">Window</label>
          <select id="trend-range-select" style="width:auto; min-width:130px; background:#0d1423; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:.35rem .5rem;">
            ${RANGE_OPTIONS.map((o) => `<option value="${o.key}" ${o.key === selected ? 'selected' : ''}>${o.label}</option>`).join('')}
          </select>

    }

    function habitTrendCards() {
      return TREND_HABITS.map((h) => `
        <div class="card chart-wrap" style="height:220px">
          <div class="section-title">${h.label} Trend</div>
          <div style="height:180px"><canvas id="habit-trend-${h.key}"></canvas></div>
        </div>
      `).join('');
    }

    function renderHabitTrendCharts(logs) {
      if (!logs || logs.length === 0) return;
      const days = [...logs];
      const labels = days.map(l => formatAxisDate(l.date));
      const colors = ['#22c55e','#f59e0b','#3b82f6','#ef4444','#a855f7','#06b6d4','#84cc16','#eab308'];

      TREND_HABITS.forEach((habit, idx) => {
        const canvasId = `habit-trend-${habit.key}`;
        const ctx = document.getElementById(canvasId);
        if (!ctx) return;
        if (habitCharts[habit.key]) habitCharts[habit.key].destroy();

        habitCharts[habit.key] = new Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              label: habit.label,
              data: days.map(l => trendValueForHabit(l, habit)),
              borderColor: colors[idx % colors.length],
              backgroundColor: `${colors[idx % colors.length]}22`,
              fill: true,
              tension: 0.25,
              pointRadius: 2,
              spanGaps: true,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: true, labels: { color: '#6b7280', font: { size: 10 }, boxWidth: 10 } },
              tooltip: {
                callbacks: {
                  label: (ctx) => {
                    if (ctx.raw == null) return `${ctx.dataset.label}: no data`;
                    if (habit.type === 'detailed') {
                      return `${ctx.dataset.label}: ${(ctx.raw / 10).toFixed(1)}/10`;
                    }
                    return `${ctx.dataset.label}: ${ctx.raw === 100 ? '✓ pass' : '✗ miss'}`;
                  },
                },
              },
            },
            scales: {
              y: {
                min: 0, max: 100,
                ticks: {
                  stepSize: habit.type === 'detailed' ? 20 : 100,
                  color: '#6b7280',
                  callback: (v) => (habit.type === 'detailed' ? `${v}` : (v === 100 ? 'Pass' : 'Miss')),
                  font: { size: 10 },
                },
                grid: { color: '#1e1e2e' },
              },
              x: {
                ticks: { color: '#6b7280', font: { size: 10 }, maxRotation: 0, minRotation: 0 },
                grid: { display: false },
              },
            },
          },
        });
      });
    }

    function renderStackTrendChart(logs) {
      const ctx = document.getElementById('stack-trend-chart');
      if (!ctx || !logs || logs.length === 0) return;
      const days = [...logs];
      const labels = days.map(l => formatAxisDate(l.date));
      const colors = ['#f59e0b', '#8b5cf6', '#14b8a6', '#e11d48'];

      if (stackTrendChart) stackTrendChart.destroy();
      stackTrendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: STACK_ITEMS.map((item, idx) => ({
            label: item.label,
            data: days.map((d) => {
              // Missing values should stay null so lines bridge around gaps.
              if (d[item.key] == null) return null;
              return habitToPercent(d[item.key]);
            }),
            borderColor: colors[idx % colors.length],
            backgroundColor: 'transparent',
            tension: 0.25,
            pointRadius: 2,
            spanGaps: true,
          })),
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true, labels: { color: '#6b7280', font: { size: 10 }, boxWidth: 10 } },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  if (ctx.raw == null) return `${ctx.dataset.label}: no data`;
                  return `${ctx.dataset.label}: ${ctx.raw === 100 ? 'taken' : 'not taken'}`;
                },
              },
            },
          },
          scales: {
            y: {
              min: 0, max: 100,
              ticks: {
                stepSize: 100,
                color: '#6b7280',
                callback: (v) => (v === 100 ? 'Taken' : 'Not'),
                font: { size: 10 },
              },
              grid: { color: '#1e1e2e' },
            },
            x: {
              ticks: { color: '#6b7280', font: { size: 10 }, maxRotation: 0, minRotation: 0 },

          },
        },
      });

    async function safeJsonFetch(url, fallback = {}) {
      try {
        const res = await fetch(url);
        const text = await res.text();
        try {
          return JSON.parse(text);
        } catch {
          return fallback;
        }
      } catch {
        return fallback;
      }
    }

    async function load() {
      try {
        const authCheck = await fetch('/api/today');
        if (authCheck.status === 401) {
          window.location.href = '/auth/login';
          return;
        }
        const todayRes = await authCheck.json();
        const [weekRes, histRes, reviewsRes, breaksRes, integrationsRes, latestLinkRes, wearablesHistRes] = await Promise.all([
          fetch('/api/week').then(r => r.json()),
          fetch('/api/history').then(r => r.json()),
          fetch('/api/reviews').then(r => r.json()),
          fetch('/api/breaks').then(r => r.json()),
          fetch('/api/integrations').then(r => r.json()),
          fetch('/api/checkin/latest-link').then(r => r.json()),
          safeJsonFetch('/api/wearables/history?days=90', { wearables: [] }),
        ]);

        const { log, targets, wearable, date } = todayRes;
        const { logs, wearables, trend, avg, avgMood } = weekRes;
        const { reviews } = reviewsRes;
        const { breaks } = breaksRes;
        const allLogs = histRes.logs;
        const allWearables = (wearablesHistRes.wearables && wearablesHistRes.wearables.length)
          ? wearablesHistRes.wearables
          : (wearables || []);
        const fitbit = integrationsRes.fitbit;
        const latestLink = latestLinkRes;
        const monthlyLogs = getFilteredByRange(allLogs, 'month');
        const monthlyWearables = getFilteredByRange(allWearables, 'month');
        const avgMonthlyScore = monthlyLogs.length
          ? (monthlyLogs.reduce((s, r) => s + (r.daily_score ?? r.total_score ?? 0), 0) / monthlyLogs.length).toFixed(1)
          : '—';
        const monthlyMoodRows = monthlyLogs.filter((l) => l.mood_1_10 != null);
        const avgMonthlyMood = monthlyMoodRows.length
          ? (monthlyMoodRows.reduce((s, r) => s + r.mood_1_10, 0) / monthlyMoodRows.length).toFixed(1)
          : '—';
        const monthlyRhrRows = monthlyWearables.filter((w) => w.resting_hr != null);
        const avgMonthlyRhr = monthlyRhrRows.length
          ? Math.round(monthlyRhrRows.reduce((s, r) => s + r.resting_hr, 0) / monthlyRhrRows.length)
          : '—';

        document.getElementById('header-date').textContent = formatHeaderDate(date);
        document.getElementById('refresh-hint').textContent =
          `Avg monthly - Day score: ${avgMonthlyScore} . Mood: ${avgMonthlyMood} . RHR: ${avgMonthlyRhr}${fitbit?.connected ? ' . Fitbit: on' : ''}`;

        const selectedRange = window.__trendRange || 'week';
        const rangedLogs = getFilteredByRange(allLogs, selectedRange);
        const rangedWearables = getFilteredByRange(wearables || [], selectedRange);

        document.getElementById('app').innerHTML = `
          <div class="section">
            ${trendRangeControls(selectedRange)}
          </div>

          <div class="section">
            <div class="grid-2">
              <div class="card chart-wrap" style="height:220px">
                <div class="section-title">Day score</div>
                <div style="height:180px"><canvas id="day-score-chart"></canvas></div>
              </div>
              <div class="card chart-wrap" style="height:220px">
                <div class="section-title">Mood</div>
                <div style="height:180px"><canvas id="mood-chart"></canvas></div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="grid-2">
              <div class="card chart-wrap" style="height:220px">
                <div class="section-title">Resting HR Trend</div>
                <div style="height:180px"><canvas id="rhr-chart"></canvas></div>
              </div>
              <div class="card chart-wrap" style="height:220px">
                <div class="section-title">Sleep Trend</div>
                <div style="height:180px"><canvas id="sleep-chart"></canvas></div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="grid-2">
              ${todayCard(log, targets, date)}
              ${wearablesCard(wearable, wearables)}
            </div>
          </div>

          <div class="section">
            <div class="grid-2">
              ${habitGridCard(logs.length > 0 ? logs : [])}
              ${missesCard(logs)}
            </div>
          </div>

          <div class="section">
            <div class="section-title">Habit Trend Lines</div>
            <div class="grid-2">
              ${habitTrendCards()}
            </div>
          </div>

          <div class="section">
            <div class="card chart-wrap" style="height:280px">
              <div class="section-title">Daily Stack Tracking</div>
              <div style="height:240px"><canvas id="stack-trend-chart"></canvas></div>
            </div>
          </div>

          <div class="section">
            ${coachingCard(reviews)}
          </div>

          <div class="section">
            ${breakLogCard(breaks)}
          </div>

          <div class="section">
            ${latestCheckinLinkCard(latestLink)}
          </div>

          <div class="section">
            ${integrationCard(fitbit)}
          </div>

          <div class="section">
            ${scoringGuideCard()}
          </div>

        `;

        renderDayScoreChart(rangedLogs);
        renderMoodChart(rangedLogs);
        renderRhrChart(rangedWearables);
        renderSleepChart(rangedWearables);
        renderHabitTrendCharts(rangedLogs);
        renderStackTrendChart(rangedLogs);
        bindActionButtons();
        const rangeSelect = document.getElementById('trend-range-select');
        if (rangeSelect) {
          rangeSelect.addEventListener('change', (e) => {
            window.__trendRange = e.target.value;
            load();
          });
        }

      } catch (err) {
        document.getElementById('app').innerHTML =
          `<div class="empty" style="text-align:center;padding:3rem">Failed to load — is the server running?<br><small>${err.message}</small></div>`;
      }
    }

    function bindActionButtons() {
      const copyBtn = document.getElementById('copy-checkin-link');
      if (copyBtn) {
        copyBtn.addEventListener('click', async () => {
          const linkEl = document.getElementById('latest-checkin-link');
          const status = document.getElementById('copy-checkin-status');
          const link = linkEl ? linkEl.href : '';
          try {
            await navigator.clipboard.writeText(link);
            status.textContent = 'Copied';
          } catch {
            status.textContent = 'Copy failed';
          }
          setTimeout(() => { status.textContent = ''; }, 2000);
        });
      }

      async function syncFitbitNowOnce() {
        const res = await fetch('/api/fitbit/sync-now', { method: 'POST' });
        const body = await res.json();
        if (!res.ok || !body.ok) throw new Error(body.error || 'Sync failed');
      }

      async function getTodayWearable() {
        const today = await safeJsonFetch('/api/today', {});
        return today?.wearable || null;
      }

      function delay(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function bindFitbitSyncButton(buttonId, statusId, options = {}) {
        const { scoreAware = false } = options;
        const syncBtn = document.getElementById(buttonId);
        if (!syncBtn) return;
        syncBtn.addEventListener('click', async () => {
          const status = document.getElementById(statusId);
          syncBtn.disabled = true;
          if (status) status.textContent = 'Syncing...';
          try {
            await syncFitbitNowOnce();
            await load();

            if (scoreAware) {
              let wearable = await getTodayWearable();
              if (wearable?.sleep_score == null) {
                if (status) status.textContent = 'Waiting for Fitbit score... retrying';
                await delay(8000);
                await syncFitbitNowOnce();
                await load();
                wearable = await getTodayWearable();
              }
              if (status) {
                status.textContent = wearable?.sleep_score != null
                  ? `Score updated (${wearable.sleep_score})`
                  : 'Still pending from Fitbit API';
              }
            } else if (status) {
              status.textContent = 'Synced';
            }
          } catch {
            if (status) status.textContent = 'Sync error';
          } finally {
            syncBtn.disabled = false;
            if (status) {
              setTimeout(() => { status.textContent = ''; }, 5000);
            }
          }
        });
      }

      bindFitbitSyncButton('fitbit-sync-now', 'fitbit-sync-status');
      bindFitbitSyncButton('fitbit-sync-sleep-now', 'fitbit-sync-sleep-status', { scoreAware: true });
    }

    document.getElementById('header-date').textContent = formatHeaderDate(new Date().toISOString().slice(0, 10));
    load();
    setInterval(load, 5 * 60 * 1000); // refresh every 5 min
  </script>
